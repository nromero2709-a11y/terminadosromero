<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Clientes — Terminados Romero</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0d2240; --blue:#1a5fa8; --sky:#4a9fd4;
  --steel:#c8d8e8; --off:#f4f7fb; --muted:#6b7f96;
  --border:#cddaeb; --red:#c0392b; --white:#ffffff;
}
body { font-family:'Barlow',sans-serif; background:#f0f4f9; min-height:100vh; }

/* ── LOGIN SCREEN ── */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,#133060 60%,var(--navy) 100%);
}
.login-card {
  background:#fff; border-radius:24px; padding:48px 40px;
  width:100%; max-width:420px; text-align:center;
  box-shadow:0 40px 90px rgba(0,0,0,0.35);
  animation:fadeUp .4s ease;
}
.login-logo { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:8px; }
.login-brand { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; color:var(--navy); letter-spacing:2px; line-height:1; text-align:left; }
.login-tag   { font-size:11px; color:var(--sky); letter-spacing:3px; font-weight:300; }
.login-divider { height:2px; background:linear-gradient(90deg,var(--blue),var(--sky)); border-radius:2px; margin:22px 0; }
.login-title { font-size:20px; font-weight:700; color:var(--navy); margin-bottom:6px; }
.login-sub   { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.5; }
.login-error { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; border-radius:10px; padding:10px 14px; font-size:13px; margin-top:16px; display:none; }

/* Google button container */
#google-btn-container { display:flex; justify-content:center; }

/* ── LOADING OVERLAY ── */
#loading-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(13,34,64,0.7); z-index:2000;
  align-items:center; justify-content:center; flex-direction:column; gap:16px;
}
.spinner {
  width:44px; height:44px; border:4px solid rgba(255,255,255,0.2);
  border-top-color:#fff; border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-txt { color:#fff; font-size:14px; font-weight:600; letter-spacing:0.5px; }

/* ── APP (hidden until logged in) ── */
#app { display:none; }

/* ── HEADER ── */
.app-header {
  background:linear-gradient(135deg,var(--navy) 0%,#133060 60%,var(--navy) 100%);
  padding:20px 28px 0; color:#fff;
}
.header-inner { max-width:1200px; margin:0 auto; }
.brand-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:18px; }
.brand-logo { display:flex; align-items:center; gap:14px; }
.brand-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:800; letter-spacing:2px; line-height:1; }
.brand-tag  { font-size:10px; color:var(--sky); letter-spacing:3px; margin-top:3px; font-weight:300; }
.brand-sub  { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }

.header-right { display:flex; align-items:center; gap:12px; }

/* User pill */
.user-pill {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.1); border:1px solid rgba(74,159,212,0.3);
  border-radius:100px; padding:6px 14px 6px 6px;
}
.user-avatar {
  width:30px; height:30px; border-radius:50%; object-fit:cover;
  background:var(--blue); display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff;
}
.user-name { font-size:12px; font-weight:600; color:#fff; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.btn-logout {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:8px; padding:6px 12px; color:rgba(255,255,255,0.7);
  font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; font-weight:500;
  transition:all .2s;
}
.btn-logout:hover { background:rgba(255,255,255,0.2); color:#fff; }

.btn-new {
  padding:10px 20px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--sky),var(--blue));
  color:#fff; font-size:13px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; gap:7px;
  font-family:'Barlow',sans-serif;
  box-shadow:0 4px 18px rgba(26,95,168,0.4); transition:all .2s;
}
.btn-new:hover { transform:translateY(-1px); }

.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.stat-card { background:rgba(255,255,255,0.07); border-radius:12px; padding:12px 16px; border:1px solid rgba(74,159,212,0.2); }
.stat-icon { font-size:20px; }
.stat-val  { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; margin-top:3px; }
.stat-lbl  { font-size:10px; color:rgba(255,255,255,0.5); margin-top:1px; }

.tabs-row { display:flex; gap:6px; background:rgba(255,255,255,0.06); border-radius:14px; padding:5px; border:1px solid rgba(74,159,212,0.2); }
.tab-btn { flex:1; padding:10px 16px; border:none; border-radius:10px; font-family:'Barlow',sans-serif; font-size:14px; font-weight:600; cursor:pointer; color:rgba(255,255,255,0.55); background:transparent; transition:all .2s; }
.tab-btn.active { background:var(--blue); color:#fff; box-shadow:0 4px 14px rgba(26,95,168,0.5); }

.stripe { height:4px; background:linear-gradient(90deg,var(--blue),var(--sky),#a8d8f0); }

/* ── SYNC STATUS BAR ── */
.sync-bar {
  background:#fff; border-bottom:1px solid var(--border);
  padding:6px 28px; font-size:12px; color:var(--muted);
  display:flex; align-items:center; gap:8px;
}
.sync-dot { width:8px; height:8px; border-radius:50%; background:#10B981; flex-shrink:0; }
.sync-dot.syncing { background:#F59E0B; animation:pulse 1s infinite; }
.sync-dot.error   { background:var(--red); }

/* ── FILTERS BAR ── */
.filters-bar { background:#fff; border-bottom:1px solid var(--border); padding:12px 28px; position:sticky; top:0; z-index:50; }
.filters-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.search-inp { flex:1 1 200px; padding:8px 14px; border-radius:10px; border:1.5px solid var(--border); font-size:14px; outline:none; font-family:'Barlow',sans-serif; color:var(--navy); transition:border-color .2s; }
.search-inp:focus { border-color:var(--blue); }
.chip-group { display:flex; gap:6px; flex-wrap:wrap; }
.chip { padding:5px 14px; border-radius:20px; border:1.5px solid var(--border); background:#fff; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; white-space:nowrap; transition:all .15s; }
.chip.active { border-color:var(--blue); background:var(--blue); color:#fff; }

/* ── MAIN ── */
.main-content { max-width:1200px; margin:0 auto; padding:24px 28px; }
.clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:16px; }

/* ── CLIENT CARD ── */
.client-card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 2px 10px rgba(13,34,64,0.07); border:1px solid #F3F4F6; transition:all .2s; }
.client-card:hover { box-shadow:0 10px 32px rgba(13,34,64,0.14); border-color:var(--steel); transform:translateY(-2px); }
.card-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:14px; }
.avatar { width:44px; height:44px; border-radius:12px; flex-shrink:0; background:linear-gradient(135deg,var(--navy),var(--blue)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; }
.card-name  { font-weight:700; font-size:15px; color:var(--navy); font-family:'Barlow Condensed',sans-serif; letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-phone { font-size:12px; color:var(--muted); margin-top:1px; }
.card-actions { display:flex; gap:5px; margin-left:auto; }
.icon-btn { width:30px; height:30px; border-radius:8px; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:transform .15s; }
.icon-btn:hover { transform:scale(1.1); }
.product-box { background:var(--off); border-radius:10px; padding:9px 12px; margin-bottom:12px; border-left:3px solid var(--sky); }
.product-lbl  { font-size:11px; color:var(--muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.5px; }
.product-name { font-weight:700; font-size:13px; color:var(--navy); }
.product-svc  { font-size:12px; color:var(--muted); }
.badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.progress-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.progress-track  { height:5px; background:#E5E7EB; border-radius:99px; }
.progress-fill   { height:100%; border-radius:99px; transition:width .4s ease; }
.money-row   { display:flex; justify-content:space-between; margin-top:5px; font-size:12px; }
.balance-red { color:var(--red); font-weight:700; }
.install-row { margin-top:10px; display:flex; align-items:center; gap:6px; font-size:12px; color:var(--navy); background:var(--off); border-radius:8px; padding:5px 10px; }
.notes-row   { margin-top:7px; font-size:11px; color:var(--muted); font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── CALENDAR ── */
.calendar-layout { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
.cal-box { background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 2px 16px rgba(13,34,64,0.08); border:1px solid var(--border); }
.cal-nav { background:linear-gradient(135deg,var(--navy),var(--blue)); padding:18px 22px; display:flex; align-items:center; justify-content:space-between; }
.cal-nav-btn { background:rgba(255,255,255,0.15); border:none; border-radius:8px; width:34px; height:34px; color:#fff; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:background .2s; }
.cal-nav-btn:hover { background:rgba(255,255,255,0.25); }
.cal-month-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; color:#fff; letter-spacing:1px; text-align:center; }
.cal-year { font-size:13px; color:var(--sky); text-align:center; }
.cal-day-headers { display:grid; grid-template-columns:repeat(7,1fr); background:var(--off); border-bottom:1px solid var(--border); }
.cal-day-hdr { text-align:center; padding:10px 0; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:8px 10px 14px; }
.cal-cell { min-height:62px; border-radius:10px; padding:6px 7px; margin:2px; border:2px solid transparent; transition:all .15s; display:flex; flex-direction:column; }
.cal-cell.has-event { cursor:pointer; }
.cal-cell.has-event:hover { background:var(--off) !important; }
.cal-cell.is-today    { background:var(--off); border-color:var(--sky); }
.cal-cell.is-selected { background:var(--blue) !important; border-color:var(--navy) !important; }
.cal-day-num { font-size:13px; text-align:right; margin-bottom:4px; }
.cal-cell.is-selected .cal-day-num { color:#fff; font-weight:700; }
.cal-cell.is-today    .cal-day-num { color:var(--blue); font-weight:700; }
.cal-event-chip { font-size:10px; font-weight:600; padding:2px 5px; border-radius:5px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:2px; }
.cal-cell.is-selected .cal-event-chip { background:rgba(255,255,255,0.22) !important; color:#fff !important; }
.side-panel { display:flex; flex-direction:column; gap:14px; }
.day-detail { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 16px rgba(13,34,64,0.1); border:1px solid var(--border); }
.day-detail-hdr { background:linear-gradient(90deg,var(--navy),var(--blue)); padding:12px 16px; }
.day-detail-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; color:#fff; }
.day-detail-sub   { font-size:11px; color:var(--sky); }
.day-detail-body  { padding:14px; display:flex; flex-direction:column; gap:10px; }
.detail-item { background:var(--off); border-radius:12px; padding:10px 12px; border-left:3px solid var(--sky); }
.detail-name { font-weight:700; font-size:14px; color:var(--navy); font-family:'Barlow Condensed',sans-serif; }
.detail-prod { font-size:12px; color:var(--muted); margin-bottom:8px; }
.detail-btns { display:flex; gap:6px; margin-top:8px; }
.detail-btn  { flex:1; padding:7px 0; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Barlow',sans-serif; transition:all .15s; }
.detail-btn.wa   { border:none; background:#25D366; color:#fff; }
.detail-btn.edit { border:1.5px solid var(--border); background:#fff; color:var(--navy); }
.upcoming-box { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 16px rgba(13,34,64,0.08); border:1px solid var(--border); }
.upcoming-hdr { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.upcoming-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; color:var(--navy); font-size:15px; }
.upcoming-list  { padding:12px; display:flex; flex-direction:column; gap:8px; max-height:360px; overflow-y:auto; }
.upcoming-empty { font-size:13px; color:var(--muted); text-align:center; padding:14px 0; }
.upcoming-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; cursor:pointer; border:1px solid transparent; transition:all .15s; }
.upcoming-item:hover   { background:var(--off); }
.upcoming-item.selected{ background:var(--off); border-color:var(--sky); }
.date-badge { flex-shrink:0; background:var(--blue); color:#fff; border-radius:8px; width:36px; text-align:center; padding:4px 0; }
.date-badge-day { font-size:16px; font-weight:800; font-family:'Barlow Condensed',sans-serif; line-height:1; }
.date-badge-mon { font-size:9px; text-transform:uppercase; letter-spacing:0.5px; }
.upcoming-name { font-weight:700; font-size:13px; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.upcoming-prod { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── MODALS ── */
.overlay { position:fixed; inset:0; background:rgba(13,34,64,0.6); z-index:1000; display:flex; align-items:flex-start; justify-content:center; padding:16px; overflow-y:auto; backdrop-filter:blur(3px); }
.modal { background:#fff; border-radius:20px; width:100%; max-width:520px; padding:28px; margin-top:40px; margin-bottom:40px; box-shadow:0 32px 72px rgba(13,34,64,0.25); animation:fadeUp .25s ease; }
.modal.wide { max-width:580px; }
.modal-hdr { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:var(--navy); }
.modal-close { margin-left:auto; background:none; border:none; cursor:pointer; font-size:26px; color:#9CA3AF; line-height:1; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-grid .full { grid-column:1/span 2; }
.field label { font-size:11px; font-weight:600; color:var(--muted); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.6px; }
.field input,.field textarea,.field select { width:100%; padding:9px 12px; border-radius:8px; border:1.5px solid var(--border); font-size:14px; outline:none; font-family:'Barlow',sans-serif; color:var(--navy); background:var(--off); transition:border-color .2s; }
.field input:focus,.field textarea:focus,.field select:focus { border-color:var(--blue); background:#fff; }
.field textarea { resize:vertical; min-height:60px; }
.modal-footer { display:flex; gap:10px; margin-top:22px; }
.btn-cancel { flex:1; padding:12px 0; border-radius:10px; border:1.5px solid var(--border); background:#fff; cursor:pointer; font-size:14px; color:var(--muted); font-weight:600; font-family:'Barlow',sans-serif; }
.btn-save   { flex:2; padding:12px 0; border-radius:10px; border:none; background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; cursor:pointer; font-size:14px; font-weight:700; font-family:'Barlow',sans-serif; transition:all .2s; }
.btn-save:hover { transform:translateY(-1px); }

/* WA modal */
.wa-templates { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.wa-tpl-btn { padding:9px 12px; border-radius:10px; border:2px solid #E5E7EB; background:#fff; cursor:pointer; text-align:left; font-size:13px; color:var(--navy); font-family:'Barlow',sans-serif; display:flex; align-items:center; gap:7px; transition:all .15s; }
.wa-tpl-btn.active { border-color:#25D366; background:#F0FDF4; color:#065F46; font-weight:700; }
.wa-preview { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:14px; margin-bottom:16px; }
.wa-preview-lbl  { font-size:10px; font-weight:700; color:#065F46; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.wa-preview-text { font-size:13px; color:var(--navy); margin:0; line-height:1.6; }
.wa-preview textarea { width:100%; border:none; background:transparent; resize:vertical; font-size:13px; color:var(--navy); font-family:'Barlow',sans-serif; min-height:80px; outline:none; box-sizing:border-box; }
.btn-wa { width:100%; padding:13px 0; border-radius:12px; border:none; background:#25D366; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:'Barlow',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .2s; }
.btn-wa:hover { background:#1ebe5c; }

.empty-state { text-align:center; padding:60px 0; color:var(--muted); }
.portal-footer { text-align:center; margin-top:28px; font-size:11px; color:var(--steel); }

@keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }

@media(max-width:900px){ .stats-row{grid-template-columns:repeat(2,1fr)} .calendar-layout{grid-template-columns:1fr} }
@media(max-width:580px){ .clients-grid{grid-template-columns:1fr} .app-header,.filters-bar,.main-content{padding-left:16px;padding-right:16px} .form-grid{grid-template-columns:1fr} .form-grid .full{grid-column:1} .wa-templates{grid-template-columns:1fr} }
</style>
</head>
<body>

<!-- ═══════════ LOADING ═══════════ -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Cargando...</div>
</div>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 52 52" fill="none">
        <rect x="6" y="6" width="22" height="22" rx="2" transform="rotate(45 6 26)" fill="#1a5fa8" opacity="0.85"/>
        <line x1="14" y1="26" x2="26" y2="14" stroke="white" stroke-width="1.4" opacity="0.6"/>
        <line x1="17" y1="29" x2="29" y2="17" stroke="white" stroke-width="1.4" opacity="0.6"/>
        <rect x="4" y="14" width="22" height="22" rx="1.5" stroke="#4a9fd4" stroke-width="1.8" fill="none"/>
        <rect x="34" y="14" width="6" height="32" rx="2" fill="#4a9fd4"/>
        <rect x="43" y="8" width="6" height="38" rx="2" fill="#1a5fa8"/>
      </svg>
      <div>
        <div class="login-brand">TERMINADOS ROMERO</div>
        <div class="login-tag">VIDRIO Y ALUMINIO</div>
      </div>
    </div>
    <div class="login-divider"></div>
    <div class="login-title">Acceso al Portal</div>
    <div class="login-sub">Inicia sesión con tu cuenta de Google autorizada para continuar.</div>
    <div id="google-btn-container"></div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app">
  <div class="app-header">
    <div class="header-inner">
      <div class="brand-row">
        <div class="brand-logo">
          <svg width="44" height="44" viewBox="0 0 52 52" fill="none">
            <rect x="6" y="6" width="22" height="22" rx="2" transform="rotate(45 6 26)" fill="#1a5fa8" opacity="0.85"/>
            <line x1="14" y1="26" x2="26" y2="14" stroke="white" stroke-width="1.4" opacity="0.6"/>
            <line x1="17" y1="29" x2="29" y2="17" stroke="white" stroke-width="1.4" opacity="0.6"/>
            <rect x="4" y="14" width="22" height="22" rx="1.5" stroke="#4a9fd4" stroke-width="1.8" fill="none"/>

<script>
// ══════════════════════════════════════════════════════════════════════
//  CONFIGURACIÓN — CAMBIA ESTOS VALORES
// ══════════════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbtenJW-Dx9Y2hAxqJ-qbhhXlP38h4C9NKRmsWS3gwFlq4FqlRz3k4ERxA19otB57Z3w/exec";
// Ejemplo: "https://script.google.com/macros/s/AKfycb.../exec"

const GOOGLE_CLIENT_ID = "690131213957-1aa7gknl65ia6lusvemd1rrst1fj83co.apps.googleusercontent.com";
// Ejemplo: "123456789-abc.apps.googleusercontent.com"

// ══════════════════════════════════════════════════════════════════════
const PAY_COLORS  = { pendiente:{bg:'#FEF3C7',txt:'#92400E',dot:'#F59E0B'}, parcial:{bg:'#DBEAFE',txt:'#1E40AF',dot:'#3B82F6'}, pagado:{bg:'#D1FAE5',txt:'#065F46',dot:'#10B981'} };
const WORK_COLORS = { cotizacion:{bg:'#F3F4F6',txt:'#374151',dot:'#9CA3AF'}, produccion:{bg:'#FEF3C7',txt:'#92400E',dot:'#F59E0B'}, fabricando:{bg:'#FFEDD5',txt:'#9A3412',dot:'#F97316'}, listo:{bg:'#D1FAE5',txt:'#065F46',dot:'#10B981'}, instalado:{bg:'#EDE9FE',txt:'#4C1D95',dot:'#7C3AED'} };
const PAYMENT_LABELS = { pendiente:'Sin pago', parcial:'Pago parcial', pagado:'Pagado' };
const WORK_LABELS    = { cotizacion:'Cotización', produccion:'En producción', fabricando:'Fabricando', listo:'Listo para instalar', instalado:'Instalado' };
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let clients = [], session = null;
let filtPay='all', filtWork='all', editId=null, currentTab='clientes';
let calYear, calMonth, calSelected=null, waCurrentClient=null, waCurrentType='fabricado';

// ── SESSION STORAGE ────────────────────────────────────────────────────
function saveSession(s) { session = s; try { localStorage.setItem('tr_session', JSON.stringify(s)); } catch(e){} }
function loadSession()  { try { const s = localStorage.getItem('tr_session'); return s ? JSON.parse(s) : null; } catch(e){ return null; } }
function clearSession() { session = null; try { localStorage.removeItem('tr_session'); } catch(e){} }

// ── API CALLS ──────────────────────────────────────────────────────────
async function api(body) {
  if (session) body.token = session.token;
  const res = await fetch(APPS_SCRIPT_URL, {
    method:'POST', body:JSON.stringify(body),
    headers:{'Content-Type':'text/plain'}
  });
  return res.json();
}

// ── LOADING ────────────────────────────────────────────────────────────
function showLoading(txt='Cargando...') {
  document.getElementById('loading-txt').textContent = txt;
  document.getElementById('loading-overlay').style.display = 'flex';
}
function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

function setSyncStatus(state, txt) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('sync-txt').textContent = txt;
}

// ── GOOGLE LOGIN ───────────────────────────────────────────────────────
function initGoogleLogin() {
  if (typeof google === 'undefined') {
    setTimeout(initGoogleLogin, 300); return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleToken,
    auto_select: false,
  });
  google.accounts.id.renderButton(
    document.getElementById('google-btn-container'),
    { theme:'outline', size:'large', width:320, text:'signin_with', shape:'rectangular', locale:'es' }
  );
}

async function handleGoogleToken(response) {
  showLoading('Verificando cuenta...');
  try {
    const data = await api({ accion:'login', googleToken: response.credential });
    if (data.ok) {
      saveSession(data);
      enterApp(data);
    } else {
      hideLoading();
      showLoginError(data.error || 'Error al iniciar sesión.');
    }
  } catch(e) {
    hideLoading();
    showLoginError('No se pudo conectar al servidor. Verifica tu conexión.');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  if (session) { try { await api({ accion:'logout' }); } catch(e){} }
  clearSession();
  location.reload();
}

// ── ENTER APP ──────────────────────────────────────────────────────────
function enterApp(s) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // User display
  const initials = s.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-avatar-initials').textContent = initials;
  document.getElementById('user-name-display').textContent    = s.name.split(' ')[0];

  initCalendar();
  loadClients();
}

// ── LOAD CLIENTS ───────────────────────────────────────────────────────
async function loadClients() {
  setSyncStatus('syncing', 'Sincronizando con Google Sheets...');
  try {
    const data = await api({ accion:'getClientes' });
    if (data.ok) {
      clients = data.clientes;
      setSyncStatus('ok', 'Sincronizado · ' + new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}));
      renderAll();
    } else {
      setSyncStatus('error', 'Error: ' + data.error);
    }
  } catch(e) {
    setSyncStatus('error', 'Sin conexión. Mostrando datos locales.');
  }
  hideLoading();
}

// ── HELPERS ────────────────────────────────────────────────────────────
function fmtDate(d) { if(!d)return'—'; const[y,m,day]=d.split('-'); return`${day}/${m}/${y}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function initials(name) { return name.split(' ').map(w=>w[0]).slice(0,2).join(''); }

function badge(type, value) {
  const c = type==='pay' ? PAY_COLORS[value] : WORK_COLORS[value];
  const l = type==='pay' ? PAYMENT_LABELS[value] : WORK_LABELS[value];
  return `<span class="badge" style="background:${c.bg};color:${c.txt}"><span class="badge-dot" style="background:${c.dot}"></span>${l}</span>`;
}

function progressBar(paid, total) {
  const pct = total>0 ? Math.min(100,Math.round(paid/total*100)) : 0;
  const col = pct===100?'#10B981':pct>0?'var(--blue)':'#E5E7EB';
  return `<div class="progress-labels"><span>$${Number(paid).toLocaleString()} pagado</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>`;
}

// ── STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const now = new Date();
  const s = {
    total:    clients.length,
    listo:    clients.filter(c=>c.workStatus==='listo').length,
    saldo:    clients.reduce((s,c)=>s+(Number(c.totalAmount)-Number(c.amountPaid)),0),
    thisWeek: clients.filter(c=>{ if(!c.installationDate)return false; const diff=(new Date(c.installationDate)-now)/86400000; return diff>=0&&diff<=7; }).length,
  };
  document.getElementById('stats-row').innerHTML = [
    {icon:'👥',val:s.total,   lbl:'Clientes'},
    {icon:'🔨',val:s.listo,   lbl:'Listos para instalar'},
    {icon:'📅',val:s.thisWeek,lbl:'Instalaciones esta semana'},
    {icon:'💰',val:'$'+s.saldo.toLocaleString(),lbl:'Saldo pendiente'},
  ].map(i=>`<div class="stat-card"><div class="stat-icon">${i.icon}</div><div class="stat-val">${i.val}</div><div class="stat-lbl">${i.lbl}</div></div>`).join('');
}

// ── CHIPS ──────────────────────────────────────────────────────────────
function renderChips() {
  document.getElementById('pay-chips').innerHTML  = `<button class="chip ${filtPay==='all'?'active':''}" onclick="setFiltPay('all')">Todos pagos</button>` + Object.entries(PAYMENT_LABELS).map(([k,v])=>`<button class="chip ${filtPay===k?'active':''}" onclick="setFiltPay('${k}')">${v}</button>`).join('');
  document.getElementById('work-chips').innerHTML = `<button class="chip ${filtWork==='all'?'active':''}" onclick="setFiltWork('all')">Todos estados</button>` + Object.entries(WORK_LABELS).map(([k,v])=>`<button class="chip ${filtWork===k?'active':''}" onclick="setFiltWork('${k}')">${v}</button>`).join('');
}
function setFiltPay(v)  { filtPay=v;  renderChips(); renderClients(); }
function setFiltWork(v) { filtWork=v; renderChips(); renderClients(); }

// ── CLIENTS ────────────────────────────────────────────────────────────
function getFiltered() {
  const q = (document.getElementById('search-inp')||{value:''}).value.toLowerCase();
  return clients.filter(c=>
    (!q||c.name.toLowerCase().includes(q)||c.phone.includes(q)||c.product.toLowerCase().includes(q))
    &&(filtPay==='all'||c.paymentStatus===filtPay)
    &&(filtWork==='all'||c.workStatus===filtWork)
  );
}

function renderClients() {
  const list = getFiltered();
  const grid = document.getElementById('clients-grid');
  const empty= document.getElementById('empty-state');
  empty.style.display = list.length===0 ? 'block' : 'none';
  grid.innerHTML = list.map(c=>{
    const balance = Number(c.totalAmount)-Number(c.amountPaid);
    return `<div class="client-card">
      <div class="card-top">
        <div class="avatar">${initials(c.name)}</div>
        <div style="flex:1;min-width:0"><div class="card-name">${c.name}</div><div class="card-phone">${c.phone}</div></div>
        <div class="card-actions">
          <button class="icon-btn" style="background:#F0FDF4" onclick="openWA('${c.id}')" title="WhatsApp">💬</button>
          <button class="icon-btn" style="background:#EFF6FF" onclick="openEdit('${c.id}')" title="Editar">✏️</button>
          <button class="icon-btn" style="background:#FEF2F2" onclick="deleteClient('${c.id}')" title="Eliminar">🗑</button>
        </div>
      </div>
      <div class="product-box"><div class="product-lbl">Producto</div><div class="product-name">${c.product}</div>${c.service?`<div class="product-svc">${c.service}</div>`:''}</div>
      <div class="badges">${badge('pay',c.paymentStatus)} ${badge('work',c.workStatus)}</div>
      ${progressBar(c.amountPaid,c.totalAmount)}
      <div class="money-row"><span style="color:var(--muted)">Total: $${Number(c.totalAmount).toLocaleString()}</span>${balance>0?`<span class="balance-red">Saldo: $${balance.toLocaleString()}</span>`:''}</div>
      ${c.installationDate?`<div class="install-row">📅 <span>Instalación: <strong>${fmtDate(c.installationDate)}</strong></span></div>`:''}
      ${c.notes?`<div class="notes-row">📝 ${c.notes}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('footer-txt').textContent = `Terminados Romero · ${list.length} de ${clients.length} registros`;
}

// ── CRUD ───────────────────────────────────────────────────────────────
function openNewClient() {
  editId=null;
  ['f-name','f-phone','f-email','f-address','f-product','f-service','f-total','f-paid','f-date','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-pay-status').value='pendiente';
  document.getElementById('f-work-status').value='cotizacion';
  document.getElementById('modal-title').textContent='Nuevo cliente';
  document.getElementById('btn-save-lbl').textContent='Agregar cliente';
  document.getElementById('client-modal').style.display='flex';
}

function openEdit(id) {
  const c = clients.find(x=>x.id===id);
  if(!c) return;
  editId=id;
  document.getElementById('f-name').value        =c.name;
  document.getElementById('f-phone').value       =c.phone;
  document.getElementById('f-email').value       =c.email;
  document.getElementById('f-address').value     =c.address;
  document.getElementById('f-product').value     =c.product;
  document.getElementById('f-service').value     =c.service;
  document.getElementById('f-total').value       =c.totalAmount;
  document.getElementById('f-paid').value        =c.amountPaid;
  document.getElementById('f-pay-status').value  =c.paymentStatus;
  document.getElementById('f-work-status').value =c.workStatus;
  document.getElementById('f-date').value        =c.installationDate;
  document.getElementById('f-notes').value       =c.notes;
  document.getElementById('modal-title').textContent='Editar cliente';
  document.getElementById('btn-save-lbl').textContent='Guardar cambios';
  document.getElementById('client-modal').style.display='flex';
}

function syncPayStatus() {
  const total=parseFloat(document.getElementById('f-total').value)||0;
  const paid =parseFloat(document.getElementById('f-paid').value)||0;
  document.getElementById('f-pay-status').value = paid>=total&&total>0?'pagado':paid>0?'parcial':'pendiente';
}

async function saveClient() {
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const product=document.getElementById('f-product').value.trim();
  if(!name||!phone||!product){alert('Nombre, teléfono y producto son requeridos.');return;}
  const c = {
    id: editId||'',
    name,phone,
    email:document.getElementById('f-email').value.trim(),
    address:document.getElementById('f-address').value.trim(),
    product,
    service:document.getElementById('f-service').value.trim(),
    totalAmount:parseFloat(document.getElementById('f-total').value)||0,
    amountPaid:parseFloat(document.getElementById('f-paid').value)||0,
    paymentStatus:document.getElementById('f-pay-status').value,
    workStatus:document.getElementById('f-work-status').value,
    installationDate:document.getElementById('f-date').value,
    notes:document.getElementById('f-notes').value.trim(),
  };
  closeModal('client-modal');
  setSyncStatus('syncing','Guardando en Google Sheets...');
  try {
    const data = await api({ accion:'saveCliente', cliente:c });
    if(data.ok){ await loadClients(); }
    else { setSyncStatus('error','Error al guardar: '+data.error); alert('Error al guardar: '+data.error); }
  } catch(e){ setSyncStatus('error','Error de conexión.'); alert('Error de conexión al guardar.'); }
}

async function deleteClient(id) {
  if(!confirm('¿Eliminar este cliente?')) return;
  setSyncStatus('syncing','Eliminando...');
  try {
    const data = await api({ accion:'deleteCliente', id });
    if(data.ok){ await loadClients(); }
    else alert('Error al eliminar: '+data.error);
  } catch(e){ alert('Error de conexión.'); }
}

// ── WHATSAPP ───────────────────────────────────────────────────────────
const WA_TMPLS = c => ({
  fabricado:    `Hola ${c.name.split(' ')[0]} 👋, le informamos que su *${c.product}* ya fue fabricado exitosamente. Nos pondremos en contacto para coordinar la instalación. ¡Gracias por su preferencia! 🏠`,
  confirmacion: `Hola ${c.name.split(' ')[0]} 👋, confirmamos su instalación de *${c.product}* para el día *${fmtDate(c.installationDate)}*. Por favor asegúrese de que alguien esté presente. Cualquier duda, estamos a sus órdenes. ✅`,
  pago:         `Hola ${c.name.split(' ')[0]} 👋, le recordamos que tiene un saldo pendiente de *$${(Number(c.totalAmount)-Number(c.amountPaid)).toLocaleString()} MXN*. ¡Gracias! 💳`,
  listo:        `Hola ${c.name.split(' ')[0]} 👋, ¡todo listo! Su *${c.product}* ha quedado completamente instalado. Si necesita ajustes no dude en contactarnos. 🎉`,
  custom:       `Hola ${c.name.split(' ')[0]} 👋, `,
});

function openWA(id) {
  waCurrentClient=clients.find(c=>c.id===id);
  waCurrentType='fabricado';
  document.getElementById('wa-client-info').textContent=waCurrentClient.name+' · +'+waCurrentClient.phone;
  renderWATemplates(); updateWAPreview();
  document.getElementById('wa-modal').style.display='flex';
}
function renderWATemplates(){
  const btns=[{key:'fabricado',icon:'🔨',lbl:'Producto fabricado'},{key:'confirmacion',icon:'📅',lbl:'Confirmar instalación'},{key:'pago',icon:'💳',lbl:'Recordatorio de pago'},{key:'listo',icon:'🎉',lbl:'Trabajo finalizado'},{key:'custom',icon:'✏️',lbl:'Mensaje libre'}];
  document.getElementById('wa-templates').innerHTML=btns.map(b=>`<button class="wa-tpl-btn ${waCurrentType===b.key?'active':''}" onclick="selectWATpl('${b.key}')"><span>${b.icon}</span>${b.lbl}</button>`).join('');
}
function selectWATpl(k){ waCurrentType=k; renderWATemplates(); updateWAPreview(); }
function updateWAPreview(){
  const t=WA_TMPLS(waCurrentClient);
  const p=document.getElementById('wa-preview-text');
  const ta=document.getElementById('wa-custom-text');
  if(waCurrentType==='custom'){ p.style.display='none'; ta.style.display='block'; if(!ta.value)ta.value=t.custom; }
  else { p.style.display='block'; ta.style.display='none'; p.textContent=t[waCurrentType]; }
}
function sendWA(){
  const t=WA_TMPLS(waCurrentClient);
  const msg=waCurrentType==='custom'?(document.getElementById('wa-custom-text').value||t.custom):t[waCurrentType];
  window.open(`https://wa.me/${waCurrentClient.phone}?text=${encodeURIComponent(msg)}`,'_blank');
}

// ── MODAL HELPERS ──────────────────────────────────────────────────────
function closeModal(id){ document.getElementById(id).style.display='none'; }
function closeOverlay(e,id){ if(e.target.classList.contains('overlay')) closeModal(id); }

// ── TABS ───────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-clientes').classList.toggle('active',tab==='clientes');
  document.getElementById('tab-calendario').classList.toggle('active',tab==='calendario');
  document.getElementById('view-clientes').style.display  =tab==='clientes'  ?'block':'none';
  document.getElementById('view-calendario').style.display=tab==='calendario'?'block':'none';
  document.getElementById('filters-bar').style.display    =tab==='clientes'  ?'block':'none';
  if(tab==='calendario') renderCalendar();
}

// ── CALENDAR ───────────────────────────────────────────────────────────
function initCalendar(){ const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); }
function getByDate(){
  const m={};
  clients.forEach(c=>{ if(c.installationDate){if(!m[c.installationDate])m[c.installationDate]=[];m[c.installationDate].push(c);} });
  return m;
}
function renderCalendar(){
  const byDate=getByDate();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const now=new Date();
  const todayKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  let cellsHTML='';
  for(let i=0;i<firstDay;i++) cellsHTML+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const key=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const events=byDate[key]||[];
    const isToday=key===todayKey, isSel=key===calSelected, hasEv=events.length>0;
    const cls=['cal-cell',hasEv?'has-event':'',isToday?'is-today':'',isSel?'is-selected':''].filter(Boolean).join(' ');
    const chips=events.slice(0,2).map(c=>{const wc=WORK_COLORS[c.workStatus];return`<div class="cal-event-chip" style="background:${wc.bg};color:${wc.txt}">${c.name.split(' ')[0]}</div>`;}).join('')+(events.length>2?`<div style="font-size:9px;color:var(--muted);text-align:center">+${events.length-2} más</div>`:'');
    cellsHTML+=`<div class="${cls}" onclick="selectCalDay('${key}')"><div class="cal-day-num">${d}</div><div>${chips}</div></div>`;
  }
  const upcoming=Object.entries(byDate).filter(([d])=>d.startsWith(`${calYear}-${pad(calMonth+1)}`)).sort(([a],[b])=>a.localeCompare(b));
  const upItems=upcoming.flatMap(([date,cls])=>cls.map(c=>{
    const wc=WORK_COLORS[c.workStatus];const day=date.split('-')[2];const mon=MONTHS_ES[parseInt(date.split('-')[1])-1].slice(0,3);
    return`<div class="upcoming-item ${calSelected===date?'selected':''}" onclick="selectCalDay('${date}')"><div class="date-badge"><div class="date-badge-day">${day}</div><div class="date-badge-mon">${mon}</div></div><div style="flex:1;min-width:0"><div class="upcoming-name">${c.name}</div><div class="upcoming-prod">${c.product}</div></div><span class="badge" style="background:${wc.bg};color:${wc.txt}"><span class="badge-dot" style="background:${wc.dot}"></span>${WORK_LABELS[c.workStatus]}</span></div>`;
  }));
  const selC=calSelected?(byDate[calSelected]||[]):[];
  const detailHTML=selC.length>0?`<div class="day-detail"><div class="day-detail-hdr"><div class="day-detail-title">📅 ${fmtDate(calSelected)}</div><div class="day-detail-sub">${selC.length} instalación${selC.length>1?'es':''}</div></div><div class="day-detail-body">${selC.map(c=>{const pc=PAY_COLORS[c.paymentStatus];const wc=WORK_COLORS[c.workStatus];return`<div class="detail-item"><div class="detail-name">${c.name}</div><div class="detail-prod">${c.product}</div><div class="badges"><span class="badge" style="background:${pc.bg};color:${pc.txt}"><span class="badge-dot" style="background:${pc.dot}"></span>${PAYMENT_LABELS[c.paymentStatus]}</span><span class="badge" style="background:${wc.bg};color:${wc.txt}"><span class="badge-dot" style="background:${wc.dot}"></span>${WORK_LABELS[c.workStatus]}</span></div><div class="detail-btns"><button class="detail-btn wa" onclick="openWA('${c.id}')">💬 WhatsApp</button><button class="detail-btn edit" onclick="openEdit('${c.id}')">✏️ Editar</button></div></div>`;}).join('')}</div></div>`:'';
  document.getElementById('view-calendario').innerHTML=`<div class="calendar-layout"><div class="cal-box"><div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()">‹</button><div><div class="cal-month-name">${MONTHS_ES[calMonth]}</div><div class="cal-year">${calYear}</div></div><button class="cal-nav-btn" onclick="calNext()">›</button></div><div class="cal-day-headers">${DAYS_ES.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('')}</div><div class="cal-grid">${cellsHTML}</div></div><div class="side-panel">${detailHTML}<div class="upcoming-box"><div class="upcoming-hdr"><span style="font-size:16px">🗓</span><span class="upcoming-title">Instalaciones — ${MONTHS_ES[calMonth]}</span></div><div class="upcoming-list">${upItems.length===0?'<p class="upcoming-empty">Sin instalaciones este mes</p>':upItems.join('')}</div></div></div></div><p class="portal-footer">Terminados Romero · Calendario · ${clients.length} clientes</p>`;
}
function selectCalDay(key){ calSelected=calSelected===key?null:key; renderCalendar(); }
function calPrev(){ if(calMonth===0){calMonth=11;calYear--;}else calMonth--; calSelected=null; renderCalendar(); }
function calNext(){ if(calMonth===11){calMonth=0;calYear++;}else calMonth++; calSelected=null; renderCalendar(); }

function renderAll(){ renderStats(); renderChips(); renderClients(); if(currentTab==='calendario') renderCalendar(); }

// ── INIT ───────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Try to restore session
  const saved = loadSession();
  if (saved && saved.token) {
    session = saved;
    enterApp(saved);
  }
  // Always render Google button (for fresh login or fallback)
  initGoogleLogin();
});
</script>
